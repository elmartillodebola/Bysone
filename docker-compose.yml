services:

  # ── PostgreSQL local (simula Neon en desarrollo) ───────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bysone-postgres
    environment:
      POSTGRES_DB: bysone
      POSTGRES_USER: ${POSTGRES_USER:-bysone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bysone}
    ports:
      - "5433:5432"   # 5432 ocupado por postgres local — acceder con psql -p 5433
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bysone} -d bysone"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Spring Boot ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bysone-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bysone?currentSchema=bysone
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-bysone}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-bysone}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend Next.js ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bysone-frontend
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
