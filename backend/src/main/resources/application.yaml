server:
  host: localhost
  port: 9081

spring:
  application:
    name: backend

  datasource:
#    url: jdbc:postgresql://localhost:5432/postgres?currentSchema=bysone
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: bysone

  flyway:
    schemas: bysone
    default-schema: bysone
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - read:user
              - user:email
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
          microsoft:
            client-id: ${MICROSOFT_CLIENT_ID}
            client-secret: ${MICROSOFT_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: id
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: sub
          # google is a Spring Security built-in provider — no extra config needed

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt:
  # Min 256-bit (32 chars) HS256 secret — override via JWT_SECRET env var
  secret: ${JWT_SECRET:changeme-32-chars-minimum-secret-key!!}
  expiration-ms: 86400000   # 24 h

# ── Application ──────────────────────────────────────────────────────────────
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
#      root: INFO
#      org.springframework.web: DEBUG
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
